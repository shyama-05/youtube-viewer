<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Viewer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎬 YouTube Viewer</h1>

<div class="input-box">
    <input type="text" id="playlistUrl" placeholder="Paste YouTube link">
    <button onclick="loadPlaylist()">Load</button>
    <button onclick="savePlaylist()">Save</button>
</div>

<h2>📂 Saved</h2>
<div id="savedList"></div>

<!-- 🎬 PLAYER -->
<div id="playerContainer">
    <iframe id="mainPlayer" src="" allowfullscreen></iframe>
</div>

<!-- 📜 VIDEOS -->
<div id="videos"></div>

<script src="script.js"></script>
</body>
</html>
